services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0.11-alpine
    restart: unless-stopped

  django:
    build:
      context: ./backend
    restart: unless-stopped
    command: uvicorn system.asgi:application --host 0.0.0.0 --port 8000 --workers 2
    env_file:
      - .env.production
    volumes:
      - django_static:/usr/src/app/static
      - ./backend/media:/usr/src/app/media
    expose:
      - "8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - django_static:/usr/src/app/static:ro
      - ./backend/media:/usr/src/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - django

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery --app=system worker -l info
    env_file:
      - .env.production
    volumes:
      - ./backend/media:/usr/src/app/media
      - django_static:/usr/src/app/static
    depends_on:
      - db
      - redis
      - django

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery --app=system beat -l info
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
      - django

volumes:
  postgres_data:
  django_static: